<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="brandLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#BAE533"/>
      <stop offset="100%" style="stop-color:#d0f54d"/>
    </linearGradient>
  </defs>

  <!-- Background: white like docs -->
  <rect width="1280" height="640" fill="#ffffff"/>

  <!-- Subtle dot grid pattern -->
  <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
    <circle cx="12" cy="12" r="0.8" fill="#e0e0e0"/>
  </pattern>
  <rect width="1280" height="640" fill="url(#dots)"/>

  <!-- Top brand accent bar -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#brandLine)"/>

  <!-- Subtle green glow behind terminal -->
  <ellipse cx="640" cy="380" rx="500" ry="200" fill="#BAE533" opacity="0.04"/>

  <!-- Title: magecli -->
  <text x="640" y="90" font-family="'Figtree', 'Inter', -apple-system, sans-serif" font-size="60" font-weight="800" text-anchor="middle" letter-spacing="-2">
    <tspan fill="#1b1b1c">mage</tspan><tspan fill="#1b1b1c">cli</tspan>
  </text>
  <!-- Green underline on "mage" part -->
  <rect x="425" y="98" width="170" height="4" rx="2" fill="#BAE533"/>

  <!-- Subtitle -->
  <text x="640" y="128" font-family="'Figtree', 'Inter', -apple-system, sans-serif" font-size="19" fill="#566971" text-anchor="middle" font-weight="500">
    Magento 2 CLI for AI Agents &amp; Developers
  </text>

  <!-- Terminal window (dark code block like docs) -->
  <rect x="180" y="160" width="920" height="310" rx="8" fill="#1b1b1c" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Terminal title bar -->
  <rect x="180" y="160" width="920" height="38" rx="8" fill="#252527"/>
  <rect x="180" y="186" width="920" height="12" fill="#252527"/>

  <!-- Window dots -->
  <circle cx="208" cy="179" r="6" fill="#ff5f57"/>
  <circle cx="228" cy="179" r="6" fill="#febc2e"/>
  <circle cx="248" cy="179" r="6" fill="#28c840"/>

  <!-- Terminal title text -->
  <text x="640" y="184" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="12" fill="#8b8b96" text-anchor="middle">magecli</text>

  <!-- Terminal content: prompt + command -->
  <text x="212" y="228" font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="15.5">
    <tspan fill="#BAE533">$</tspan>
    <tspan fill="#d4d4d8"> magecli product list --limit </tspan>
    <tspan fill="#BAE533">3</tspan>
    <tspan fill="#d4d4d8"> --json</tspan>
  </text>

  <!-- JSON output with docs syntax colors -->
  <text font-family="'JetBrains Mono', 'SF Mono', monospace" font-size="14" fill="#8b8b96">
    <tspan x="212" y="260">[</tspan>
    <tspan x="228" dy="22">  {</tspan>
    <tspan x="248" dy="22"><tspan fill="#60a5fa">"sku"</tspan><tspan fill="#8b8b96">:</tspan> <tspan fill="#fbbf24">"EXAMPLE-001"</tspan><tspan fill="#8b8b96">,</tspan></tspan>
    <tspan x="248" dy="22"><tspan fill="#60a5fa">"name"</tspan><tspan fill="#8b8b96">:</tspan> <tspan fill="#fbbf24">"Sample Product"</tspan><tspan fill="#8b8b96">,</tspan></tspan>
    <tspan x="248" dy="22"><tspan fill="#60a5fa">"price"</tspan><tspan fill="#8b8b96">:</tspan> <tspan fill="#BAE533">49.99</tspan><tspan fill="#8b8b96">,</tspan></tspan>
    <tspan x="248" dy="22"><tspan fill="#60a5fa">"status"</tspan><tspan fill="#8b8b96">:</tspan> <tspan fill="#BAE533">1</tspan></tspan>
    <tspan x="228" dy="22">  }</tspan>
    <tspan x="212" dy="22">]</tspan>
  </text>

  <!-- Blinking cursor -->
  <rect x="212" y="432" width="9" height="18" rx="1" fill="#BAE533" opacity="0.9"/>

  <!-- Badges row -->
  <!-- Go badge (green style from docs) -->
  <rect x="330" y="498" width="68" height="28" rx="14" fill="rgba(186,229,51,0.15)" stroke="#7ec820" stroke-width="1"/>
  <text x="364" y="517" font-family="'Figtree', sans-serif" font-size="12.5" font-weight="600" fill="#2d6a00" text-anchor="middle">Go</text>

  <!-- REST API badge (blue style from docs) -->
  <rect x="412" y="498" width="100" height="28" rx="14" fill="rgba(96,165,250,0.1)" stroke="#93b4f4" stroke-width="1"/>
  <text x="462" y="517" font-family="'Figtree', sans-serif" font-size="12.5" font-weight="600" fill="#1e40af" text-anchor="middle">REST API</text>

  <!-- AI-Ready badge (magenta/accent) -->
  <rect x="526" y="498" width="105" height="28" rx="14" fill="rgba(255,0,126,0.08)" stroke="#FF007E" stroke-width="1"/>
  <text x="578" y="517" font-family="'Figtree', sans-serif" font-size="12.5" font-weight="600" fill="#FF007E" text-anchor="middle">AI-Ready</text>

  <!-- Open Source badge (green) -->
  <rect x="645" y="498" width="120" height="28" rx="14" fill="rgba(186,229,51,0.15)" stroke="#7ec820" stroke-width="1"/>
  <text x="705" y="517" font-family="'Figtree', sans-serif" font-size="12.5" font-weight="600" fill="#2d6a00" text-anchor="middle">Open Source</text>

  <!-- Cross-Platform badge (amber) -->
  <rect x="779" y="498" width="138" height="28" rx="14" fill="rgba(251,191,36,0.1)" stroke="#e0a80d" stroke-width="1"/>
  <text x="848" y="517" font-family="'Figtree', sans-serif" font-size="12.5" font-weight="600" fill="#854d0e" text-anchor="middle">Cross-Platform</text>

  <!-- ABT Logo bottom-right -->
  <image x="1070" y="560" width="150" height="60" href="data:image/png;base64," opacity="0.6"/>

  <!-- Bottom border accent -->
  <rect x="0" y="636" width="1280" height="4" fill="url(#brandLine)"/>
</svg>
