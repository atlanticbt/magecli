version: 2

project_name: magecli

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/magecli
    binary: magecli
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/atlanticbt/magecli/internal/build.versionFromLdflags={{.Version}}
      - -X github.com/atlanticbt/magecli/internal/build.commitFromLdflags={{.Commit}}
      - -X github.com/atlanticbt/magecli/internal/build.dateFromLdflags={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: atlanticbt
    name: magecli
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
